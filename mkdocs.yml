site_name: EchoZero 2
site_description: Audio analysis workstation for live lighting design
repo_url: https://github.com/griffin/echozero

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Agent Context: AGENT-CONTEXT.md
  - Getting Started: GETTING-STARTED.md
  - Unified Plan: UNIFIED-IMPLEMENTATION-PLAN.md
  - App Delivery: APP-DELIVERY-PLAN.md
  - Architecture: ARCHITECTURE.md
  - Project Class: PROJECT-CLASS.md
  - Entity Model: architecture/ENTITY-MODEL.md
  - Timeline First Principles: architecture/TIMELINE-FIRST-PRINCIPLES-2026-04-02.md
  - LD Workflow: LD-WORKFLOW.md
  - Dev Lanes: DEV-LANES.md
  - Cleanup Map: EZ2-CODEBASE-CLEANUP-MAP.md
  - Decisions:
    - Architecture Decisions: architecture/DECISIONS.md
    - Pipeline Config: architecture/PIPELINE-CONFIG-REDESIGN.md
    - Contract Guardrails: architecture/CONTRACT-EVOLUTION-GUARDRAILS.md
  - MA3:
    - Batch Transfer UX: MA3-BATCH-TRANSFER-UX-SPEC.md
    - Manual Push/Pull: MA3-MANUAL-PUSH-PULL-IMPLEMENTATION-PLAN.md
  - Foundry: FOUNDRY-TRAINING.md
  - Perf Guardrails: PERF-GUARDRAILS.md
  - Packaging: packaging/PACKAGING.md
  - Contributing: CONTRIBUTING.md
