[pytest]
# Pytest configuration for EchoZero 2
# Legacy v1 tests in tests/unit/, tests/application/, tests/integration/ are ignored
# via collect_ignore_glob in tests/conftest.py.
# New v2 tests are top-level test files in tests/.

python_files = test_*.py
python_classes = Test*
python_functions = test_*

testpaths = tests

addopts =
    -v
    --strict-markers
    --tb=short

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    golden: Golden file snapshot tests
    manual: Tests requiring manual execution (hardware, audio playback, user verification)
