[pytest]
# Pytest configuration for EchoZero 2
# The active test surface is EZ2-only.
# Canonical suites now live across tests/ui/, tests/testing/, tests/foundry/,
# tests/inference_eval/, and tests/application/.

python_files = test_*.py
python_classes = Test*
python_functions = test_*

testpaths = tests

addopts =
    -v
    --strict-markers
    --tb=short

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    golden: Golden file snapshot tests
    manual: Tests requiring manual execution (hardware, audio playback, user verification)
