name: EchoZero CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install numpy

      - name: Run tests with coverage
        run: pytest --cov=echozero --cov-report=term-missing --cov-fail-under=85

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install black isort mypy

      - name: Check formatting (black)
        run: black --check echozero tests

      - name: Check import sorting (isort)
        run: isort --check echozero tests

      - name: Type checking (mypy)
        run: mypy echozero --strict
