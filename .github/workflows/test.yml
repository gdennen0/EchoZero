name: EchoZero CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Repo hygiene guardrails
        run: python scripts/check_repo_hygiene.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install numpy

      - name: Run tests with coverage
        run: pytest --cov=echozero --cov-report=term-missing --cov-fail-under=85

  sync-receive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install numpy

      - name: Run sync receive lane
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q \
            tests/unit/test_ma3_communication_service_protocol.py \
            tests/unit/test_ma3_event_handler.py \
            tests/unit/test_ma3_event_contract.py \
            tests/unit/test_ma3_fixture_replay.py

  perf-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install numpy

      - name: Run timeline perf guardrails (strict)
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python tests/benchmarks/benchmark_timeline_phase3.py --strict --json-out artifacts/perf/timeline_phase3.json

      - name: Upload perf artifact
        uses: actions/upload-artifact@v4
        with:
          name: timeline-phase3-perf
          path: artifacts/perf/timeline_phase3.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install black isort mypy

      - name: Check formatting (black)
        run: black --check echozero tests

      - name: Check import sorting (isort)
        run: isort --check echozero tests

      - name: Type checking (mypy)
        run: mypy echozero --strict
